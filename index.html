<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Tour - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        gaming: ['Orbitron', 'sans-serif'],
                        body: ['Rajdhani', 'sans-serif'],
                    },
                    colors: {
                        dark: '#0a0a0c',
                        darker: '#050506',
                        neon: {
                            cyan: '#00f3ff',
                            purple: '#bc13fe',
                            pink: '#ff007f',
                            green: '#00ff66'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050506; color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; min-height: 100vh;}
        
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }

        .glass-panel { background: linear-gradient(145deg, rgba(30,30,40,0.8) 0%, rgba(15,15,20,0.8) 100%); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        
        .neon-border { position: relative; }
        .neon-border::before { content: ""; position: absolute; inset: -1px; border-radius: inherit; padding: 1px; background: linear-gradient(45deg, #00f3ff, #bc13fe); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
        
        /* Toast Settings */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .custom-toast { pointer-events: auto; min-width: 260px; background: rgba(15, 15, 20, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 14px 20px; border-radius: 12px; font-weight: bold; display: flex; align-items: center; gap: 14px; transform: translateY(-100px) scale(0.8); opacity: 0; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .custom-toast.show { transform: translateY(0) scale(1); opacity: 1; }
        .toast-success { border-bottom: 3px solid #00ff66; box-shadow: 0 10px 30px rgba(0, 255, 102, 0.15); }
        .toast-error { border-bottom: 3px solid #ff007f; box-shadow: 0 10px 30px rgba(255, 0, 127, 0.15); }
        .toast-icon { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 16px; }
        .toast-success .toast-icon { background: rgba(0, 255, 102, 0.15); color: #00ff66; text-shadow: 0 0 10px rgba(0,255,102,0.5); }
        .toast-error .toast-icon { background: rgba(255, 0, 127, 0.15); color: #ff007f; text-shadow: 0 0 10px rgba(255,0,127,0.5); }

        input { transition: all 0.3s ease; }
        
        /* Success Animation Classes */
        @keyframes popInScale { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 20px #00ff66, inset 0 0 20px #00ff66; } 50% { box-shadow: 0 0 50px #00ff66, inset 0 0 30px #00ff66; } }
        .animate-pop { animation: popInScale 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .glow-circle { animation: pulseGlow 2s infinite; }
    </style>
</head>
<body class="bg-darker bg-grid flex items-center justify-center p-4">

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Registration Card -->
    <div class="glass-panel w-full max-w-md rounded-2xl p-8 relative neon-border border-neon-cyan shadow-[0_0_50px_rgba(0,243,255,0.15)] my-auto z-10">
        
        <!-- App Logo/Header -->
        <div class="text-center mb-8">
            <h2 class="font-gaming text-3xl font-bold tracking-wider whitespace-nowrap flex justify-center items-center">
                <span class="bg-clip-text text-transparent bg-gradient-to-b from-white via-neon-pink to-neon-purple font-black italic">VORTEX</span> 
                <span class="text-blue-400 font-bold tracking-[0.2em] text-xl ml-2">TOUR</span>
            </h2>
            <p class="text-gray-400 font-semibold mt-2 text-sm">Create an account to join tournaments!</p>
        </div>
        
        <!-- Registration Form -->
        <form id="register-form" class="space-y-4" novalidate>
            
            <div class="bg-gray-900/50 border border-gray-700/50 p-4 rounded-xl mb-4 text-center hidden" id="ref-banner">
                <p class="text-xs text-gray-400 font-bold uppercase mb-1">Invited By</p>
                <p class="text-neon-cyan font-gaming font-bold tracking-widest text-lg" id="ref-display-text">XXXXX</p>
            </div>

            <div>
                <input type="text" id="reg-ign" required placeholder="Full Name" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-neon-purple outline-none transition">
            </div>
            <div>
                <input type="email" id="reg-email" required placeholder="Email Address" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-neon-purple outline-none transition">
            </div>
            <div>
                <input type="tel" id="reg-phone" required placeholder="Phone Number (11 Digits)" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-neon-purple outline-none transition">
            </div>
            
            <!-- Hidden or Readonly Referral Input -->
            <div id="ref-input-container">
                <input type="text" id="reg-refcode" placeholder="Referral Code (Optional)" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-neon-purple outline-none transition uppercase">
            </div>

            <div class="relative">
                <input type="password" id="reg-password" required placeholder="Password (Min 6 chars)" minlength="6" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-neon-purple outline-none transition pr-10">
                <button type="button" onclick="togglePassword('reg-password', 'reg-eye1')" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-neon-purple transition">
                    <i id="reg-eye1" class="fas fa-eye"></i>
                </button>
            </div>
            <div class="relative">
                <input type="password" id="reg-confirm-password" required placeholder="Confirm Password" minlength="6" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:border-neon-purple outline-none transition pr-10">
                <button type="button" onclick="togglePassword('reg-confirm-password', 'reg-eye2')" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-neon-purple transition">
                    <i id="reg-eye2" class="fas fa-eye"></i>
                </button>
            </div>
            
            <button type="submit" class="w-full bg-gradient-to-r from-neon-purple to-neon-pink hover:from-purple-600 hover:to-pink-600 text-white font-bold py-3.5 rounded-lg uppercase tracking-wider mt-6 shadow-[0_0_20px_rgba(188,19,254,0.4)] transition-transform hover:scale-[1.02] flex justify-center items-center">
                <span id="reg-btn-text">Create Account</span> 
                <i id="reg-spinner" class="fas fa-spinner fa-spin hidden ml-2"></i>
            </button>
        </form>
    </div>

    <!-- Full Screen Success Animation Overlay -->
    <div id="success-overlay" class="fixed inset-0 bg-[#050506]/95 backdrop-blur-md z-[100] hidden flex flex-col justify-center items-center p-4">
        <div class="relative w-32 h-32 mb-6">
            <div class="absolute inset-0 rounded-full glow-circle opacity-50"></div>
            <div class="w-full h-full bg-green-500/20 rounded-full flex items-center justify-center border-4 border-neon-green shadow-[0_0_30px_#00ff66] animate-pop relative z-10">
                <i class="fas fa-check text-5xl text-neon-green drop-shadow-[0_0_10px_#00ff66]"></i>
            </div>
        </div>
        <h2 class="font-gaming text-3xl md:text-4xl font-bold text-white mb-3 text-center animate-pop" style="animation-delay: 0.2s; opacity: 0;">Account Created!</h2>
        <p class="text-neon-cyan font-bold text-lg mb-8 animate-pop text-center" style="animation-delay: 0.4s; opacity: 0;">Registration & Referral Successful.</p>
        
        <div class="flex items-center gap-3 text-gray-400 animate-pop font-semibold" style="animation-delay: 0.6s; opacity: 0;">
            <i class="fas fa-circle-notch fa-spin text-neon-pink"></i> Redirecting to Application...
        </div>
    </div>

    <!-- FIREBASE SCRIPTS & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, increment, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // আপনার ফায়ারবেস কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyDGrq6vnMdD3VjBA1G0Wq8O0CuyHkLBl68",
            authDomain: "vortex-tour.firebaseapp.com",
            projectId: "vortex-tour",
            storageBucket: "vortex-tour.firebasestorage.app",
            messagingSenderId: "36109260800",
            appId: "1:36109260800:web:80c06b2b75351fbf5860e5",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Global functions
        window.togglePassword = function(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        };

        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `custom-toast toast-${type}`;
            let icon = type === 'success' ? '<i class="fas fa-check"></i>' : '<i class="fas fa-exclamation-triangle"></i>';
            toast.innerHTML = `<div class="toast-icon">${icon}</div><div class="toast-msg">${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 500); }, 3000);
        };

        window.validateFormInputs = function(formId) {
            const form = document.getElementById(formId);
            if (!form) return false;
            const inputs = form.querySelectorAll('input');
            let isValid = true;
            inputs.forEach(input => {
                if (input.hasAttribute('required') && !input.value.trim()) {
                    input.classList.add('border-red-500', 'shadow-[0_0_15px_rgba(239,68,68,0.4)]');
                    isValid = false;
                    input.addEventListener('input', function removeRed() {
                        this.classList.remove('border-red-500', 'shadow-[0_0_15px_rgba(239,68,68,0.4)]');
                        this.removeEventListener('input', removeRed);
                    });
                }
            });
            return isValid;
        };

        // URL Check for Referral Code
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            
            if(refCode) {
                const refInput = document.getElementById('reg-refcode');
                refInput.value = refCode.toUpperCase();
                
                // লক করে দেওয়া হলো যাতে পরিবর্তন করতে না পারে
                refInput.readOnly = true;
                refInput.classList.add('opacity-50', 'cursor-not-allowed');
                
                // সুন্দর করে উপরে ইনভাইট করা ব্যক্তির কোড শো করানো
                document.getElementById('ref-input-container').classList.add('hidden');
                document.getElementById('ref-banner').classList.remove('hidden');
                document.getElementById('ref-display-text').innerText = refCode.toUpperCase();
            }
        };

        // Registration Logic
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!window.validateFormInputs(this.id)) {
                window.showToast("অনুগ্রহ করে সব তথ্য সঠিকভাবে পূরণ করুন!", "error");
                return;
            }

            const ign = document.getElementById('reg-ign').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const refcode = document.getElementById('reg-refcode').value.trim().toUpperCase();
            const pass = document.getElementById('reg-password').value;
            const confirmPass = document.getElementById('reg-confirm-password').value;
            const btnText = document.getElementById('reg-btn-text');
            const spinner = document.getElementById('reg-spinner');

            if (pass.length < 6) {
                window.showToast("পাসওয়ার্ড অবশ্যই ৬ সংখ্যার বা তার বেশি হতে হবে!", "error");
                return;
            }

            if (pass !== confirmPass) {
                window.showToast("পাসওয়ার্ড এবং কনফার্ম পাসওয়ার্ড মিলেনি!", "error");
                return;
            }

            btnText.innerText = "Processing...";
            spinner.classList.remove('hidden');

            try {
                // ১. ফোন নাম্বার চেক
                const q = query(collection(db, "users"), where("phone", "==", phone));
                const snap = await getDocs(q);
                if (!snap.empty) {
                    window.showToast("এই ফোন নাম্বারটি ইতিমধ্যে ব্যবহৃত হয়েছে!", "error");
                    throw new Error("Duplicate Phone");
                }

                // ২. রেফারাল কোড চেক (যদি থাকে)
                let referrerDocId = null;
                if(refcode !== "") {
                    const refQ = query(collection(db, "users"), where("ffUid", "==", refcode));
                    const refSnap = await getDocs(refQ);
                    if(refSnap.empty) {
                        window.showToast("রেফারাল কোডটি সঠিক নয়!", "error");
                        throw new Error("Invalid Referral Code");
                    } else {
                        referrerDocId = refSnap.docs[0].id; // Referrer's document ID
                    }
                }

                // ৩. একাউন্ট তৈরি
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                const shortUid = user.uid.substring(0, 5).toUpperCase(); // নতুন ইউজারের ৫ ডিজিট UID (রেফারাল কোড)
                
                // ৪. ডাটাবেসে ইউজার সেভ করা
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    email: email,
                    ign: ign,
                    phone: phone,
                    ffUid: shortUid, 
                    referredBy: refcode !== "" ? refcode : null,
                    referralDepositCount: 0,
                    referralBalance: 0,
                    totalReferralEarnings: 0,
                    totalReferrals: 0,
                    depositBalance: 0,
                    winningBalance: 0,
                    matchesPlayed: 0,
                    wins: 0,
                    totalEarnings: 0,
                    joinedMatches: [],
                    status: "active",
                    lastWithdrawDate: "",
                    createdAt: new Date().getTime()
                });

                // ৫. রেফারারের রেফারাল কাউন্ট বাড়ানো (যদি ভ্যালিড রেফারার থাকে)
                if(referrerDocId) {
                    const referrerRef = doc(db, "users", referrerDocId);
                    await updateDoc(referrerRef, { 
                        totalReferrals: increment(1) 
                    });
                }

                // ৬. সাকসেস এনিমেশন এবং রিডাইরেক্ট
                showSuccessAndRedirect();

            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    window.showToast("এই জিমেইলটি ইতিমধ্যে ব্যবহৃত হয়েছে!", "error");
                } else if(error.message !== "Duplicate Phone" && error.message !== "Invalid Referral Code") {
                    window.showToast(error.message, "error");
                }
            } finally {
                btnText.innerText = "Create Account";
                spinner.classList.add('hidden');
            }
        });

        // Success Animation & Redirect Function
        function showSuccessAndRedirect() {
            document.getElementById('success-overlay').classList.remove('hidden');
            setTimeout(() => {
                // 🔴 এখানে আপনার অ্যাপ ডাউনলোডের লিংক বা মেইন অ্যাপের লিংক দিন 🔴
                window.location.href = "https://vortextour.github.io/AppDownload/"; 
            }, 3500);
        }

    </script>

    <!-- SPARKLE & PARTICLE SYSTEM -->
    <script>
        (function initSparkleSystem() {
            const canvas = document.createElement('canvas');
            canvas.id = 'sparkle-canvas';
            canvas.className = 'fixed inset-0 pointer-events-none z-[99999] w-full h-full';
            document.body.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            let width, height;
            
            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const particles = [];
            const colors = ['#00f3ff', '#bc13fe', '#ff007f', '#00ff66', '#facc15'];

            class Particle {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.size = Math.random() * 2.5 + 1;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 5 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.life = 1.0;
                    this.decay = Math.random() * 0.02 + 0.015;
                }
                update() {
                    this.vx *= 0.93;
                    this.vy *= 0.93;

                    this.x += this.vx;
                    this.y += this.vy;
                    this.life -= this.decay;
                }
                draw() {
                    if (this.life <= 0) return;
                    ctx.globalAlpha = Math.max(0, this.life);
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, width, height);
                
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    particles[i].draw();
                    if (particles[i].life <= 0) {
                        particles.splice(i, 1);
                    }
                }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            window.addEventListener('click', (e) => {
                for(let i = 0; i < 15; i++) {
                    particles.push(new Particle(e.clientX, e.clientY));
                }
            });

        })();
    </script>
</body>
</html>
